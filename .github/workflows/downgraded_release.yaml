name: Downgraded Release

on:
    # trigger on any push, both branches and tags
    push:

jobs:
    downgrade_release:
        runs-on: ubuntu-latest

        steps:
            -   uses: "actions/checkout@v4"
                with:
                    token: ${{ secrets.WORKFLOWS_TOKEN || github.token }}

            -
                uses: "shivammathur/setup-php@v2"
                with:
                    php-version: 8.3
                    coverage: none

            # invoke patches
            -   run: composer install --ansi

            # but no dev packages
            -   run: composer update --no-dev --ansi

            # get rector to "rector-local" directory, to avoid downgrading itself in the /vendor
            -   run: mkdir rector-local
            -   run: composer require rector/rector --working-dir rector-local --ansi

            # downgrade to PHP 7.4
            -   run: rector-local/vendor/bin/rector process bin src vendor --config build/rector-downgrade-php.php --ansi

            # clear the dev files
            -   run: rm -rf tests ecs.php phpstan.neon phpunit.xml .gitignore .editorconfig

            # prefix and scope
            -   run: sh prefix-code.sh

            # copy PHP 7.4 composer + workflows
            -   run: cp -r build/target-repository/. .

            # clear the dev files
            -   run: rm -rf build prefix-code.sh full-tool-build.sh scoper.php rector.php php-scoper.phar rector-local

            # setup git user
            -
                run: |
                    git config user.email "action@github.com"
                    git config user.name "GitHub Action"
            # publish to the anywherephp/behastan repository
            # see https://tomasvotruba.com/blog/how-to-release-php-81-and-72-package-in-the-same-repository/
            -
                name: "Push Downgraded Code"
                run: |
                    # create an orphan commit (no parents), so the push does not require
                    # the original repository history, which the shallow checkout does not have
                    git checkout --orphan downgraded

                    # separate a "git add" to add untracked (new) files too
                    git add --all
                    git commit -m "release PHP 7.2 downgraded"

                    git remote add downgraded-repository "https://${{ secrets.WORKFLOWS_TOKEN }}@github.com/anywherephp/behastan.git"

                    if [[ "$GITHUB_REF" == refs/tags/* ]]; then
                        # retag locally, as the tag already exists on the original commit
                        git tag "${GITHUB_REF#refs/tags/}" --force
                        git push downgraded-repository "${GITHUB_REF#refs/tags/}"
                    else
                        # branch push - each run creates a fresh downgrade commit, so the history diverges
                        git push downgraded-repository HEAD:"${GITHUB_REF#refs/heads/}" --force
                    fi
